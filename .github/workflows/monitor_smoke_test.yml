name: Special E2e Monitor Smoke & Stress Test

on:
  push:
    branches:
      - main
      - v0.*
  pull_request:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - .github/workflows/monitor_smoke_test.yml
      - "rl_insight/server/**"
      - "rl_insight/config/services/**"
      - "tests/monitor/special_e2e/**"
      - "tests/monitor/test_monitor_stress.py"
      - "docs/monitor/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  special_e2e_monitor_smoke_test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Verify CLI entry point
        run: rl-insight --help

      - name: Install server services (Prometheus, Tempo, Grafana)
        run: |
          rl-insight server install
          echo "Installed server binaries under ~/.rl-insight/services"
          ls -la ~/.rl-insight/services/*/

      - name: Start server stack
        run: |
          rl-insight server start --detach
          echo "Server stack started in detached mode."

      - name: Wait for services to be ready
        run: |
          echo "Waiting for RL-Insight hub (port 18080)..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/healthz > /dev/null 2>&1; then
              echo "Hub is ready."
              break
            fi
            echo "  attempt $i/30: hub not ready yet, waiting..."
            sleep 2
          done

          echo "Waiting for Prometheus (port 9090)..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9090/-/ready > /dev/null 2>&1; then
              echo "Prometheus is ready."
              break
            fi
            echo "  attempt $i/30: Prometheus not ready yet, waiting..."
            sleep 2
          done

          echo "Waiting for Grafana (port 3000)..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/api/health > /dev/null 2>&1; then
              echo "Grafana is ready."
              break
            fi
            echo "  attempt $i/30: Grafana not ready yet, waiting..."
            sleep 2
          done

      - name: Start persistent Ray cluster
        run: |
          ray stop --force 2>/dev/null || true
          export RL_INSIGHT_SERVER_URL=http://127.0.0.1:18080
          ray start --head --num-cpus=8 --port=6379
          echo "Ray cluster started."

      - name: Run monitor smoke test
        run: |
          python tests/monitor/special_e2e/test_monitor_smoke.py

      - name: Verify metrics in Prometheus
        run: |
          echo "Waiting for Prometheus to scrape smoke test metrics..."
          attempt=0
          max_attempts=15
          while [ $attempt -lt $max_attempts ]; do
            result=$(curl -sf "http://127.0.0.1:9090/api/v1/query?query=rl_insight_monitor_train_step_total" | python -c "import sys,json; d=json.load(sys.stdin); print(len(d['data']['result']))" 2>/dev/null || echo 0)
            if [ "$result" -gt 0 ]; then
              echo "Metrics available after $((attempt * 5))s."
              break
            fi
            attempt=$((attempt + 1))
            echo "  attempt $attempt/$max_attempts: no metrics yet, waiting 5s..."
            sleep 5
          done
          echo ""
          echo "train_step_total:"
          curl -sf "http://127.0.0.1:9090/api/v1/query?query=rl_insight_monitor_train_step_total" | python -m json.tool
          echo "reward_mean:"
          curl -sf "http://127.0.0.1:9090/api/v1/query?query=rl_insight_monitor_reward_mean" | python -m json.tool
          echo "step_latency_ms_bucket:"
          curl -sf "http://127.0.0.1:9090/api/v1/query?query=rl_insight_monitor_step_latency_ms_bucket" | python -m json.tool

      - name: Run monitor stress test
        run: |
          python tests/monitor/test_monitor_stress.py

      - name: Stop server stack
        if: always()
        run: |
          echo "Stopping RL-Insight server stack..."
          rl-insight server stop || true
          # Clean up any lingering Ray processes.
          ray stop --force 2>/dev/null || true
